<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ALZAIN RACING - سيارات خارقة حقيقية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 0 60px rgba(0,255,255,0.4);
            border: 1px solid rgba(0,255,255,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 15px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
            border: 1px solid #0ff;
        }

        .score-box, .speed-box {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .car-name {
            font-size: 0.85rem;
            background: linear-gradient(135deg, #ff8800, #ff4400);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 10px orange;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .ctrl-btn {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #0ff;
            color: #0ff;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.05s linear;
            text-align: center;
            min-width: 100px;
            box-shadow: 0 0 12px rgba(0,255,255,0.4);
        }

        .ctrl-btn:active {
            transform: scale(0.92);
            background: #0ff;
            color: black;
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 1.7rem;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(4px);
            z-index: 999;
        }

        @media (max-width: 650px) {
            .ctrl-btn { padding: 10px 18px; font-size: 1.3rem; min-width: 70px; }
            .score-box, .speed-box { font-size: 0.8rem; padding: 3px 10px; }
            .car-name { font-size: 0.65rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>

<div>
    <div class="game-container">
        <div class="info-panel">
            <div class="score-box">🏆 <span id="scoreValue">0</span></div>
            <div class="car-name" id="carNameDisplay">🏁 KOENIGSEGG JESKO</div>
            <div class="speed-box">⚡ <span id="speedValue">0</span> km/h</div>
        </div>

        <canvas id="gameCanvas" width="500" height="700"></canvas>

        <div class="controls">
            <div class="ctrl-btn" id="leftBtn">◀</div>
            <div class="ctrl-btn" id="rightBtn">▶</div>
        </div>
    </div>
    <button class="music-btn" id="musicToggle">🎵</button>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // قائمة السيارات الخارقة الحقيقية
        const HYPERCARS = [
            { name: "KOENIGSEGG JESKO", mainColor: "#F5B81B", lightColor: "#FFD966", darkColor: "#B87D00", speed: 480, emblem: "K", accent: "#FFAA22" },
            { name: "LAMBORGHINI REVUELTO", mainColor: "#6DC44A", lightColor: "#8FDF6B", darkColor: "#3A7822", speed: 350, emblem: "L", accent: "#AAFF44" },
            { name: "FERRARI SF90", mainColor: "#E32119", lightColor: "#FF5544", darkColor: "#8B0000", speed: 340, emblem: "F", accent: "#FF3333" },
            { name: "BUGATTI CHIRON", mainColor: "#1E6FCF", lightColor: "#4A9EFF", darkColor: "#0A3670", speed: 420, emblem: "B", accent: "#44AAFF" },
            { name: "PORSCHE 911 TURBO", mainColor: "#D43B88", lightColor: "#FF6DAD", darkColor: "#8B1A4A", speed: 330, emblem: "P", accent: "#FF88CC" },
            { name: "MCLAREN SPEEDTAIL", mainColor: "#FF6F00", lightColor: "#FFA042", darkColor: "#B24F00", speed: 403, emblem: "M", accent: "#FFAA55" },
            { name: "ASTON MARTIN VALKYRIE", mainColor: "#2A6F6F", lightColor: "#4F9E9E", darkColor: "#0F3A3A", speed: 370, emblem: "A", accent: "#55DDDD" }
        ];
        
        let currentIndex = 0;
        let currentCar = HYPERCARS[currentIndex];
        document.getElementById('carNameDisplay').innerHTML = `🏎️ ${currentCar.name}`;
        
        let playerX = canvas.width/2 - 40;
        const PLAYER_W = 80;
        const PLAYER_H = 100;
        let score = 0;
        let currentSpeedKmh = 0;
        let gameRunning = true;
        let enemies = [];
        let leftPressed = false, rightPressed = false;
        let frame = 0;
        let spawnDelay = 0;
        
        // الموسيقى
        let audioCtx = null;
        let musicActive = false;
        let musicIntervalId = null;
        let osc = null;
        let gain = null;
        
        function initMusic() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gain = audioCtx.createGain();
            gain.gain.value = 0.1;
            gain.connect(audioCtx.destination);
        }
        
        function startAmbientMusic() {
            if(!musicActive || !audioCtx) return;
            if(osc) { try{ osc.stop(); }catch(e){} }
            osc = audioCtx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = 261.63;
            osc.connect(gain);
            osc.start();
            let lowNote = 261.63;
            if(musicIntervalId) clearInterval(musicIntervalId);
            musicIntervalId = setInterval(() => {
                if(!musicActive || !osc) return;
                lowNote = (lowNote === 261.63) ? 293.66 : 261.63;
                try{ osc.frequency.value = lowNote; }catch(e){}
            }, 2100);
        }
        
        function stopAmbientMusic() {
            if(musicIntervalId) { clearInterval(musicIntervalId); musicIntervalId = null; }
            if(osc) { try{ osc.stop(); }catch(e){} osc = null; }
        }
        
        function drawRealisticCar(x, y, w, h, car, isPolice = false) {
            if(isPolice) {
                ctx.fillStyle = "#0A1C2E";
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#0ff";
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, 12);
                ctx.fill();
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(x+10, y+15, w-20, 18);
                ctx.fillStyle = "#0044FF";
                ctx.font = `bold ${Math.floor(w/3)}px monospace`;
                ctx.fillText("POLICE", x+12, y+50);
                ctx.fillStyle = "#FF0000";
                ctx.fillRect(x+5, y+5, 12, 12);
                ctx.fillRect(x+w-17, y+5, 12, 12);
                return;
            }
            
            ctx.shadowBlur = 12;
            ctx.shadowColor = car.accent;
            ctx.fillStyle = car.mainColor;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 14);
            ctx.fill();
            
            ctx.fillStyle = car.lightColor;
            ctx.beginPath();
            ctx.roundRect(x+10, y+8, w-20, 22, 8);
            ctx.fill();
            
            ctx.fillStyle = "#AADDFF";
            ctx.beginPath();
            ctx.roundRect(x+15, y+32, w-30, 20, 6);
            ctx.fill();
            
            ctx.fillStyle = "#1A1A1A";
            ctx.fillRect(x+5, y+h-18, 16, 16);
            ctx.fillRect(x+w-21, y+h-18, 16, 16);
            ctx.fillStyle = "#444";
            ctx.fillRect(x+7, y+h-16, 12, 12);
            ctx.fillRect(x+w-19, y+h-16, 12, 12);
            
            ctx.fillStyle = "#FFFFAA";
            ctx.fillRect(x+4, y+8, 10, 8);
            ctx.fillRect(x+w-14, y+8, 10, 8);
            
            ctx.fillStyle = "#FFF5CF";
            ctx.font = `bold ${Math.floor(w/5)}px "Arial"`;
            ctx.fillText(car.emblem, x+w/2-10, y+h-45);
            
            ctx.fillStyle = car.darkColor;
            ctx.fillRect(x+15, y-6, w-30, 6);
        }
        
        if(!CanvasRenderingContext2D.prototype.roundRect){
            CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
                if(w<2*r) r=w/2;
                if(h<2*r) r=h/2;
                this.moveTo(x+r,y);
                this.lineTo(x+w-r,y);
                this.quadraticCurveTo(x+w,y,x+w,y+r);
                this.lineTo(x+w,y+h-r);
                this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
                this.lineTo(x+r,y+h);
                this.quadraticCurveTo(x,y+h,x,y+h-r);
                this.lineTo(x,y+r);
                this.quadraticCurveTo(x,y,x+r,y);
                return this;
            };
        }
        
        function updateSpeed() {
            let target = Math.min(currentCar.speed, 70 + Math.floor(score/4));
            currentSpeedKmh = Math.floor(currentSpeedKmh * 0.93 + target * 0.07);
            document.getElementById('speedValue').innerText = Math.min(currentCar.speed, currentSpeedKmh);
        }
        
        function handleMovement() {
            if(leftPressed) playerX -= 9;
            if(rightPressed) playerX += 9;
            playerX = Math.min(Math.max(playerX, 12), canvas.width - PLAYER_W - 12);
        }
        
        function addEnemy() {
            let w = 68, h = 92;
            enemies.push({
                x: 15 + Math.random() * (canvas.width - w - 30),
                y: -h,
                w: w,
                h: h
            });
        }
        
        function updateEnemies() {
            for(let i=0;i<enemies.length;i++){
                enemies[i].y += 4.5 + score/400;
                if(enemies[i].y > canvas.height){
                    enemies.splice(i,1);
                    i--;
                    score++;
                    document.getElementById('scoreValue').innerText = score;
                    updateSpeed();
                }
            }
        }
        
        function collisionDetect() {
            for(let e of enemies){
                if(playerX < e.x+e.w && playerX+PLAYER_W > e.x &&
                   canvas.height-120 < e.y+e.h && canvas.height-120+PLAYER_H > e.y){
                    gameRunning = false;
                    return true;
                }
            }
            return false;
        }
        
        function drawRoad() {
            ctx.fillStyle = "#07121E";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "#FFCC66";
            ctx.lineWidth = 5;
            ctx.setLineDash([35, 50]);
            for(let i=-2;i<4;i++){
                ctx.beginPath();
                ctx.moveTo(canvas.width/2, (i*180 + frame*3) % canvas.height);
                ctx.lineTo(canvas.width/2, (i*180 + frame*3) % canvas.height + 110);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.fillStyle = "#2A3F5E";
            for(let s=0;s<12;s++){
                ctx.fillRect(12, (s*70+frame*2)%canvas.height, 8, 35);
                ctx.fillRect(canvas.width-20, (s*70+frame*2)%canvas.height, 8, 35);
            }
        }
        
        setInterval(()=>{
            if(!gameRunning) return;
            currentIndex = (currentIndex+1)%HYPERCARS.length;
            currentCar = HYPERCARS[currentIndex];
            document.getElementById('carNameDisplay').innerHTML = `🏎️ ${currentCar.name}`;
            canvas.style.boxShadow = `0 0 25px ${currentCar.accent}`;
            setTimeout(()=> canvas.style.boxShadow = "", 400);
        }, 14000);
        
        function animate(){
            if(!gameRunning){
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#FF3366";
                ctx.font = "bold 32px Orbitron";
                ctx.fillText("GAME OVER", canvas.width/2-110, canvas.height/2-30);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#0ff";
                ctx.fillText("⟳ أعد تحميل الصفحة للعب", canvas.width/2-140, canvas.height/2+45);
                return;
            }
            
            handleMovement();
            updateEnemies();
            if(collisionDetect()) return;
            
            if(Math.random()<0.02 + score/5000 || spawnDelay++>50){
                spawnDelay=0;
                addEnemy();
            }
            
            drawRoad();
            drawRealisticCar(playerX, canvas.height-118, PLAYER_W, PLAYER_H, currentCar, false);
            for(let e of enemies){
                drawRealisticCar(e.x, e.y, e.w, e.h, null, true);
            }
            
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#0ff";
            ctx.fillText(`MAX: ${currentCar.speed} km/h`, 18, 45);
            ctx.fillText(`🚀 ${currentCar.name}`, 18, 75);
            
            frame++;
            requestAnimationFrame(animate);
        }
        
        function bindControls(){
            const left = document.getElementById('leftBtn');
            const right = document.getElementById('rightBtn');
            
            const startLeft = (e) => { e.preventDefault(); leftPressed=true; };
            const stopLeft = (e) => { leftPressed=false; };
            const startRight = (e) => { e.preventDefault(); rightPressed=true; };
            const stopRight = (e) => { rightPressed=false; };
            
            left.addEventListener('mousedown', startLeft);
            left.addEventListener('mouseup', stopLeft);
            left.addEventListener('mouseleave', stopLeft);
            left.addEventListener('touchstart', startLeft);
            left.addEventListener('touchend', stopLeft);
            
            right.addEventListener('mousedown', startRight);
            right.addEventListener('mouseup', stopRight);
            right.addEventListener('mouseleave', stopRight);
            right.addEventListener('touchstart', startRight);
            right.addEventListener('touchend', stopRight);
            
            window.addEventListener('keydown', (e)=>{
                if(e.key === 'ArrowLeft'){ startLeft(e); }
                if(e.key === 'ArrowRight'){ startRight(e); }
            });
            window.addEventListener('keyup', (e)=>{
                if(e.key === 'ArrowLeft') stopLeft(e);
                if(e.key === 'ArrowRight') stopRight(e);
            });
        }
        
        const musicBtn = document.getElementById('musicToggle');
        musicBtn.addEventListener('click', ()=>{
            if(!musicActive){
                initMusic();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                musicActive=true;
                startAmbientMusic();
                musicBtn.innerText = '🔇';
                musicBtn.style.boxShadow = '0 0 15px cyan';
            } else {
                musicActive=false;
                stopAmbientMusic();
                musicBtn.innerText = '🎵';
                musicBtn.style.boxShadow = 'none';
            }
        });
        
        bindControls();
        updateSpeed();
        animate();
        
        setInterval(()=> { if(gameRunning) updateSpeed(); }, 200);
    })();
</script>
</body>
</html>
